# Quality gate on every push and pull request. Not to be confused with worker.yml,
# which is the job runner (ADR-0006), not CI.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # A real Postgres, because row-level security is enforced by Postgres and by nothing
    # else, so a mock would only be testing our beliefs about it. Those beliefs were wrong
    # once already: see packages/db/src/rls.ts.
    #
    # Not Neon. CI runs on every push and would trample the shared database, and a container
    # is hermetic, parallel-safe, and free. It also exercises the fix on a second Postgres:
    # the container's `postgres` role is a superuser and superusers bypass RLS too, so if
    # dropping to `seo_app` were not working, this job would fail here rather than in
    # production.
    services:
      postgres:
        image: postgres:18
        env:
          # Throwaway. This database is created for this job, listens on localhost inside
          # the runner, and is destroyed with it.
          POSTGRES_PASSWORD: ${{ env.PGPASSWORD }}
          POSTGRES_DB: seo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      # Version comes from "packageManager" in package.json. Do not also pin it here:
      # the action errors on two sources of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The crawler's integration tests drive a real browser against a real HTTP server.
      # The story's falsification condition is about how it behaves against a live origin,
      # and no mock can falsify that, so the ~1 minute this costs is the price of the test
      # actually meaning something.
      - name: Install Chromium
        run: pnpm --filter @seo/crawler exec playwright install --with-deps chromium

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Assembled here rather than written out as a literal connection string, so that no
      # credential-shaped URI is ever committed. The password is a throwaway for a
      # localhost container, but "it is only a test credential" is the reasoning that puts
      # real ones in repos, and a secret scanner that has been taught to ignore this file
      # is a secret scanner that will ignore the next thing too.
      - name: Point the tests at the service container
        run: echo "DATABASE_URL=postgresql://postgres:${PGPASSWORD}@localhost:5432/seo_test" >> "$GITHUB_ENV"

      # Before the tests, not after: the RLS suite has nothing to assert against until the
      # schema and the policies exist.
      - name: Migrate the test database
        run: pnpm --filter @seo/db db:migrate

      - name: Test
        run: pnpm test
