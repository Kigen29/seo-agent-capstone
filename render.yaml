# The API, on Render's free web service. See ADR-0006 (everything runs on a free tier).
#
# The free instance spins down after ~15 minutes of inactivity and takes 30 to 60 seconds to
# wake. That is a real property of the product, not a footnote: the dashboard has to handle a
# cold start honestly rather than showing a broken page, and the sprint demo should wake the
# service before it starts.
services:
  - type: web
    name: seo-agent-api
    runtime: node
    plan: free
    region: oregon

    # Build from the monorepo root: the API depends on five workspace packages, and pnpm
    # needs the lockfile and the workspace manifest to resolve them.
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: node apps/api/dist/server.js

    # Render polls this. It must not require a token, or the service is marked unhealthy and
    # restarted forever.
    healthCheckPath: /health

    envVars:
      - key: NODE_VERSION
        value: 24
      # Set in the Render dashboard, never here. This is the owner credential and it carries
      # BYPASSRLS (ADR-0008).
      - key: DATABASE_URL
        sync: false
      # The web app's origin, so CORS admits it and nothing else.
      - key: WEB_URL
        sync: false
      # Encrypts Google refresh tokens at rest, and signs the OAuth callback state
      # (ADR-0003, ADR-0009). Generate with: openssl rand -base64 32
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      # Google OAuth for Search Console. Set in the dashboard, never here. The redirect URI
      # must be this service's public /auth/google/callback and match the Cloud console.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # GitHub App, for connecting a repo and opening pull requests (ADR-0002). Set in the
      # dashboard, never here. GH_APP_*, not GITHUB_*, because GitHub Actions reserves that
      # prefix and the worker reads the same names from its secrets. Without all four, the
      # connect and webhook routes report 503 and the rest of the API runs fine.
      - key: GH_APP_ID
        sync: false
      - key: GH_APP_PRIVATE_KEY
        sync: false
      - key: GH_APP_WEBHOOK_SECRET
        sync: false
      # The App's public URL slug (github.com/apps/<slug>). Not a secret, but set here too so
      # the install URL can be built.
      - key: GH_APP_SLUG
        sync: false
